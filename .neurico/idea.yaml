idea:
  title: 1-person RLHF
  domain: artificial_intelligence
  hypothesis: 'Training a value function on a single person''s preferences may still
    result in an RLHF''d model that is verbose, bland, or exhibits the ''all AI sounds
    the same'' problem. This research aims to determine how much this effect is attributable
    to pretraining, supervised fine-tuning (SFT), or RLHF.

    '
  background:
    description: 'If we train a value function on a person''s preferences, does an
      RLHF''d model still become annoyingly verbose, bland, or otherwise generic?
      This idea seeks to disentangle how much the ''all AI sounds the same'' problem
      is due to pretraining, SFT, or RLHF.

      '
